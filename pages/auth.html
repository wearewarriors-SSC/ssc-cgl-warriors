<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
SSC Warriors Login
</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top right,#7c3aed,transparent 25%),
radial-gradient(circle at bottom left,#2563eb,transparent 25%),
#020617;

overflow:hidden;
color:white;
}

.card{

width:100%;
max-width:430px;

padding:42px;

border-radius:32px;

background:
rgba(15,23,42,0.72);

backdrop-filter:blur(22px);

border:
1px solid rgba(255,255,255,0.12);

box-shadow:
0 8px 32px rgba(0,0,0,0.45);
}

.logo{

width:70px;
height:70px;

margin:auto;
margin-bottom:24px;

border-radius:22px;

background:
linear-gradient(
135deg,
#4f46e5,
#9333ea
);

display:flex;
align-items:center;
justify-content:center;

font-size:32px;
font-weight:800;
}

h1{

font-size:42px;
font-weight:800;

text-align:center;
margin-bottom:10px;
}

.subtitle{

text-align:center;
opacity:0.7;
margin-bottom:34px;
}

.input-group{

margin-bottom:22px;
}

label{

display:block;
margin-bottom:10px;
font-size:14px;
font-weight:600;
}

input{

width:100%;

padding:16px 18px;

border-radius:16px;

border:
1px solid rgba(255,255,255,0.12);

background:
rgba(255,255,255,0.05);

color:white;

font-size:15px;

outline:none;
}

button{

width:100%;

padding:16px;

border:none;

border-radius:18px;

font-size:16px;
font-weight:700;

cursor:pointer;

margin-top:12px;
}

.login-btn{

background:
linear-gradient(
135deg,
#4f46e5,
#9333ea
);

color:white;
}

.signup-btn{

background:
rgba(255,255,255,0.08);

color:white;
}

.footer{

margin-top:28px;

text-align:center;

font-size:13px;

opacity:0.65;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">
⚔️
</div>

<h1>
Welcome
</h1>

<p class="subtitle">
SSC CGL Warriors Arena
</p>

<div class="input-group">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your email"
/>

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter your password"
/>

</div>

<button
class="login-btn"
id="loginBtn"
>
Sign In
</button>

<button
class="signup-btn"
id="signupBtn"
>
Create Account
</button>

<div class="footer">
Top 500 Rank Mission 🚀
</div>

</div>

<script type="module">

import {
supabase
}
from '../js/config/supabase.js'

async function signup(){

const email =
document.getElementById('email').value

const password =
document.getElementById('password').value

const {
error
} =
await supabase.auth.signUp({
email,
password
})

if(error){

alert(error.message)
return
}

alert(
'Account created successfully'
)
}

async function login(){

const email =
document.getElementById('email').value

const password =
document.getElementById('password').value

const {
error
} =
await supabase.auth.signInWithPassword({
email,
password
})

if(error){

alert(error.message)
return
}

window.location.href =
'../index.html'
}

document
.getElementById('signupBtn')
.addEventListener('click',signup)

document
.getElementById('loginBtn')
.addEventListener('click',login)

</script>

</body>
</html>
