<!DOCTYPE html>

<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
SSC Warriors Login
</title>

<link
rel="stylesheet"
href="../css/dashboard.css"
>

</head>

<body>

<div class="auth-container">

<div class="auth-title">

<h1>
SSC Warriors
</h1>

<p class="auth-subtitle">

Realtime SSC CGL preparation ecosystem

</p>

</div>

<div class="presence-card">

<input
id="email"
type="email"
placeholder="Enter email"
>

<input
id="password"
type="password"
placeholder="Enter password"
>

<button id="signupBtn">
Sign Up
</button>

<button id="loginBtn">
Login
</button>

</div>

</div>

<script type="module">

import {
supabase
}
from '../js/config/supabase.js'

async function signup() {

const email =
document.getElementById(
'email'
).value

const password =
document.getElementById(
'password'
).value

const {
error
} = await supabase.auth.signUp({

email,
password

})

if(error){

alert(error.message)

return
}

alert(
'Signup successful'
)
}

async function login() {

const email =
document.getElementById(
'email'
).value

const password =
document.getElementById(
'password'
).value

const {
error
} = await supabase.auth.signInWithPassword({

email,
password

})

if(error){

alert(error.message)

return
}

window.location.href =
'./dashboard.html'
}

document
.getElementById(
'signupBtn'
)

.onclick =
signup

document
.getElementById(
'loginBtn'
)

.onclick =
login

</script>

</body>

</html>
