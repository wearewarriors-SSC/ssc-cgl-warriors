<!DOCTYPE html>

<html>

<head>

    <title>
        SSC Warriors Dashboard
    </title>

    <link
        rel="stylesheet"
        href="../css/dashboard.css"
    >

</head>

<body>

    <h1>
        SSC Warriors Dashboard
    </h1>

    <div id="userInfo"></div>

    <div id="stats"></div>

    <canvas
        id="performanceChart"
        width="400"
        height="200"
    ></canvas>

    <script type="module">

        import {
            requireAuth
        }

        from '../js/auth/session.js'

        import {
            getStudyStats
        }

        from '../js/utils/stats.js'

        import {
            buildPerformanceChart
        }

        from '../js/charts/performanceChart.js'

        const user =
        await requireAuth()

        document
        .getElementById(
            'userInfo'
        )

        .innerHTML = `

            <div class="presence-card">

                Logged in as:

                <br><br>

                <b>
                    ${user.email}
                </b>

            </div>
        `

        const stats =
        getStudyStats()

        document
        .getElementById(
            'stats'
        )

        .innerHTML = `

            <div class="presence-card">

                Sessions:
                ${stats.totalSessions}

                <br><br>

                Minutes:
                ${stats.totalMinutes}

            </div>
        `

        buildPerformanceChart(

            document.getElementById(
                'performanceChart'
            ),

            [
                'Mon',
                'Tue',
                'Wed',
                'Thu',
                'Fri'
            ],

            [
                50,
                60,
                70,
                80,
                90
            ]
        )

    </script>

</body>

</html>
