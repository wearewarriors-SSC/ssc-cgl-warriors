<!DOCTYPE html>

<html>

<head>

    <title>
        SSC Warriors Dashboard
    </title>

    <link
        rel="stylesheet"
        href="../css/dashboard.css"
    >

</head>

<body>

    <h1>
        SSC Warriors Dashboard
    </h1>

    <div id="userInfo"></div>

    <div id="stats"></div>

    <button id="studyBtn">
        Complete 25 Min Session
    </button>

    <canvas
        id="performanceChart"
        width="400"
        height="200"
    ></canvas>

    <script type="module">

        import {
            requireAuth
        }

        from '../js/auth/session.js'

        import {
            saveSession,
            getSessions
        }

        from '../js/database/sessions.js'

        import {
            buildPerformanceChart
        }

        from '../js/charts/performanceChart.js'

        const user =
        await requireAuth()

        document
        .getElementById(
            'userInfo'
        )

        .innerHTML = `

            <div class="presence-card">

                Logged in as:

                <br><br>

                <b>
                    ${user.email}
                </b>

            </div>
        `

        async function loadStats() {

            const sessions =
            await getSessions(
                user.id
            )

            const totalMinutes =
            sessions.reduce(

                (sum, item) =>

                sum +
                (
                    item.duration || 0
                ),

                0
            )

            document
            .getElementById(
                'stats'
            )

            .innerHTML = `

                <div class="presence-card">

                    Sessions:
                    ${sessions.length}

                    <br><br>

                    Minutes:
                    ${totalMinutes}

                </div>
            `
        }

        document
        .getElementById(
            'studyBtn'
        )

        .addEventListener(

            'click',

            async () => {

                await saveSession({

                    user_id:
                    user.id,

                    duration:
                    25,

                    note:
                    'Study Session'
                })

                loadStats()
            }
        )

        await loadStats()

        buildPerformanceChart(

            document.getElementById(
                'performanceChart'
            ),

            [
                'Mon',
                'Tue',
                'Wed',
                'Thu',
                'Fri'
            ],

            [
                50,
                60,
                70,
                80,
                90
            ]
        )

    </script>

</body>

</html>
