<!DOCTYPE html>

<html>

<head>

    <title>
        SSC Warriors Dashboard
    </title>

    <link
        rel="stylesheet"
        href="../css/dashboard.css"
    >

</head>

<body>

    <h1>
        SSC Warriors Dashboard
    </h1>

    <div id="userInfo"></div>

    <div id="stats"></div>

    <button id="studyBtn">
        Complete 25 Min Session
    </button>

    <canvas
        id="performanceChart"
        width="400"
        height="200"
    ></canvas>

    <script type="module">
import { showToast } from '../js/ui/toast.js'
import { applyAppShell } from '../js/ui/appShell.js'
applyAppShell()

     
     import '../js/auth/guard.js'
    
        import {
            requireAuth
        }

        from '../js/auth/session.js'

        import {
            saveSession,
            getSessions
        }

        from '../js/database/sessions.js'

        import {
            buildPerformanceChart
        }

        from '../js/charts/performanceChart.js'

        import {
            buildWeeklyMinutes
        }

        from '../js/utils/chartData.js'

        const user =
        await requireAuth()

        document
        .getElementById(
            'userInfo'
        )

        .innerHTML = `

            <div class="presence-card">

                Logged in as:

                <br><br>

                <b>
                    ${user.email}
                </b>

            </div>
        `

        async function loadDashboard() {

            const sessions =
            await getSessions(
                user.id
            )

            const totalMinutes =
            sessions.reduce(

                (sum, item) =>

                sum +
                (
                    item.duration || 0
                ),

                0
            )

            document
            .getElementById(
                'stats'
            )

            .innerHTML = `

                <div class="presence-card">

                    Sessions:
                    ${sessions.length}

                    <br><br>

                    Minutes:
                    ${totalMinutes}

                </div>
            `

            const weekly =
            buildWeeklyMinutes(
                sessions
            )

            buildPerformanceChart(

                document.getElementById(
                    'performanceChart'
                ),

                weekly.labels,

                weekly.data
            )
        }

        document
        .getElementById(
            'studyBtn'
        )

        .addEventListener(

            'click',

            async () => {

                await saveSession({

                    user_id:
                    user.id,

                    duration:
                    25,

                    note:
                    'Study Session'
                })

                loadDashboard()
            }
        )

        await loadDashboard()

    </script>

</body>

</html>
