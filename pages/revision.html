<!DOCTYPE html>

<html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0"><title>
        Revision Planner
    </title>

    <link
        rel="stylesheet"
        href="../css/dashboard.css"
    >

</head>

<body>

    <h1>
        Daily Revision Planner
    </h1>

    <div id="missions"></div>

    <div id="revisionPlan"></div>

    <script type="module">
import { showToast } from '../js/ui/toast.js'
import { applyAppShell } from '../js/ui/appShell.js'
applyAppShell()

        import {
            generateDailyMission
        }

        from '../js/utils/missions.js'

        import {
            buildRevisionCycle
        }

        from '../js/utils/revisionCycles.js'

        const missions =
        generateDailyMission()

        const missionContainer =
        document.getElementById(
            'missions'
        )

        missions.forEach(
            mission => {

                const item =
                document.createElement(
                    'div'
                )

                item.className =
                'presence-card'

                item.innerHTML = `
                    🎯 ${mission}
                `

                missionContainer
                    .appendChild(
                        item
                    )
            }
        )

        const revisionTopics = [

            'Percentage',

            'Algebra',

            'Coding-Decoding',

            'Error Detection',

            'Modern History'
        ]

        const plans =
        buildRevisionCycle(
            revisionTopics
        )

        const planContainer =
        document.getElementById(
            'revisionPlan'
        )

        plans.forEach(plan => {

            const card =
            document.createElement(
                'div'
            )

            card.className =
            'presence-card'

            card.innerHTML = `

                <b>
                    ${plan.topic}
                </b>

                <br><br>

                Revision Days:

                ${plan.cycle.join(
                    ', '
                )}

            `

            planContainer
                .appendChild(card)
        })

    </script>

</body>

</html>
