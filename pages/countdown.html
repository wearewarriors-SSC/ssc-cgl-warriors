<!DOCTYPE html>
<html>
<head>
<title>SSC Countdown</title>
<link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<h1>SSC Exam Countdown</h1>

<div class="presence-card">

<h2 id="countdown"></h2>

</div>

<script>

const target =
new Date(
'2026-01-01'
)

function updateCountdown() {

const now =
new Date()

const diff =
target - now

const days =
Math.floor(
diff /
(1000*60*60*24)
)

document
.getElementById(
'countdown'
)

.innerText =
`${days} Days Left`

}

updateCountdown()

setInterval(
updateCountdown,
1000
)

</script>

</body>
</html>
