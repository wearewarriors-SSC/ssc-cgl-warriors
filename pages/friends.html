<!DOCTYPE html>

<html>

<head>

    <title>
        Study Friends
    </title>

    <link
        rel="stylesheet"
        href="../css/dashboard.css"
    >

</head>

<body>

    <h1>
        Study Friends
    </h1>

    <input
        id="friendEmail"
        placeholder="Friend Email"
    >

    <button id="followBtn">
        Follow
    </button>

    <div id="friends"></div>

    <script type="module">
import { applyAppShell } from '../js/ui/appShell.js'
applyAppShell()
import '../js/auth/guard.js'

        import {
            requireAuth
        }

        from '../js/auth/session.js'

        import {
            followUser,
            getFriends
        }

        from '../js/database/friends.js'

        const user =
        await requireAuth()

        async function loadFriends() {

            const friends =
            await getFriends(
                user.email
            )

            const container =
            document.getElementById(
                'friends'
            )

            container.innerHTML = ''

            friends.forEach(friend => {

                const card =
                document.createElement(
                    'div'
                )

                card.className =
                'presence-card'

                card.innerHTML = `

                    👥 Following

                    <br><br>

                    ${friend.following_email}
                `

                container.appendChild(
                    card
                )
            })
        }

        document
        .getElementById(
            'followBtn'
        )

        .addEventListener(

            'click',

            async () => {

                const following_email =
                document
                .getElementById(
                    'friendEmail'
                ).value

                await followUser({

                    follower_email:
                    user.email,

                    following_email
                })

                loadFriends()
            }
        )

        loadFriends()

    </script>

</body>

</html>
