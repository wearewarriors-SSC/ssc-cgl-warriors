<!DOCTYPE html>

<html>

<head>

    <title>
        SSC Warriors Leaderboard
    </title>

    <link
        rel="stylesheet"
        href="../css/dashboard.css"
    >

</head>

<body>

    <h1>
        Live Leaderboard
    </h1>

    <div id="leaderboard"></div>

    <script type="module">
import { applyAppShell } from '../js/ui/appShell.js'
applyAppShell()
import '../js/auth/guard.js'

        import {
            requireAuth
        }

        from '../js/auth/session.js'

        import {
            getLeaderboard
        }

        from '../js/database/leaderboard.js'

        await requireAuth()

        async function loadLeaderboard() {

            const rows =
            await getLeaderboard()

            const container =
            document.getElementById(
                'leaderboard'
            )

            container.innerHTML = ''

            rows.forEach(

                (row, index) => {

                    const card =
                    document.createElement(
                        'div'
                    )

                    card.className =
                    'presence-card'

                    card.innerHTML = `

                        <h3>
                            #${index + 1}
                        </h3>

                        User:

                        <br><br>

                        ${row.user}

                        <br><br>

                        Minutes:

                        ${row.total}

                    `

                    container.appendChild(
                        card
                    )
                }
            )
        }

        loadLeaderboard()

    </script>

</body>

</html>
