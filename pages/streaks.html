<!DOCTYPE html>

<html>

<head>

    <title>
        Study Streaks
    </title>

    <link
        rel="stylesheet"
        href="../css/dashboard.css"
    >

</head>

<body>

    <h1>
        Daily Study Streak
    </h1>

    <div id="streakCard"></div>

    <button id="studyBtn">
        Mark Study Complete
    </button>

    <script type="module">
import { applyAppShell } from '../js/ui/appShell.js'
applyAppShell()
import '../js/auth/guard.js'

        import {
            requireAuth
        }

        from '../js/auth/session.js'

        import {
            updateStreak,
            getStreak
        }

        from '../js/database/streaks.js'

        const user =
        await requireAuth()

        async function loadStreak() {

            const streak =
            await getStreak(
                user.email
            )

            document
            .getElementById(
                'streakCard'
            )

            .innerHTML = `

                <div class="presence-card">

                    🔥 Current Streak

                    <br><br>

                    <h2>
                        ${streak} Days
                    </h2>

                </div>
            `
        }

        document
        .getElementById(
            'studyBtn'
        )

        .addEventListener(

            'click',

            async () => {

                await updateStreak(
                    user.email
                )

                loadStreak()
            }
        )

        loadStreak()

    </script>

</body>

</html>
