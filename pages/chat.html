<!DOCTYPE html>

<html>

<head>

    <title>
        Study Group Chat
    </title>

    <link
        rel="stylesheet"
        href="../css/dashboard.css"
    >

</head>

<body>

    <h1>
        Group Chat
    </h1>

    <div id="messages"></div>

    <input
        id="messageInput"
        placeholder="Type message..."
    >

    <button id="sendBtn">
        Send
    </button>

    <script type="module">
import { showToast } from '../js/ui/toast.js'
import { applyAppShell } from '../js/ui/appShell.js'
applyAppShell()
import '../js/auth/guard.js'

        import {
            requireAuth
        }

        from '../js/auth/session.js'

        import {
            sendMessage,
            getMessages
        }

        from '../js/database/chat.js'

        import {
            supabase
        }

        from '../js/config/supabase.js'

        const GROUP =
        'global'

        const user =
        await requireAuth()

        async function loadMessages() {

            const messages =
            await getMessages(
                GROUP
            )

            const container =
            document.getElementById(
                'messages'
            )

            container.innerHTML = ''

            messages.forEach(msg => {

                const card =
                document.createElement(
                    'div'
                )

                card.className =
                'presence-card'

                card.innerHTML = `

                    <b>
                        ${msg.user_email}
                    </b>

                    <br><br>

                    ${msg.message}
                `

                container.appendChild(
                    card
                )
            })
        }

        document
        .getElementById(
            'sendBtn'
        )

        .addEventListener(

            'click',

            async () => {

                const message =
                document
                .getElementById(
                    'messageInput'
                ).value

                await sendMessage({

                    group_name:
                    GROUP,

                    user_email:
                    user.email,

                    message
                })

                document
                .getElementById(
                    'messageInput'
                ).value = ''

                loadMessages()
            }
        )

        await loadMessages()

        supabase

            .channel(
                'group-chat'
            )

            .on(

                'postgres_changes',

                {

                    event: '*',

                    schema: 'public',

                    table:
                    'group_messages'
                },

                () => {

                    loadMessages()
                }
            )

            .subscribe()

    </script>

</body>

</html>
