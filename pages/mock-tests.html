<!DOCTYPE html>

<html>

<head>

    <title>
        Mock Test Entry
    </title>

    <link
        rel="stylesheet"
        href="../css/dashboard.css"
    >

</head>

<body>

    <h1>
        Mock Test Entry
    </h1>

    <form id="mockForm">

        <input
            id="mockName"
            placeholder="Mock Name"
        >

        <br><br>

        <select id="mockType">

            <option>
                T1
            </option>

            <option>
                T2
            </option>

            <option>
                SEC
            </option>

        </select>

        <br><br>

        <input
            id="score"
            type="number"
            placeholder="Score"
        >

        <br><br>

        <input
            id="total"
            type="number"
            placeholder="Total"
        >

        <br><br>

        <button type="submit">
            Save Mock
        </button>

    </form>

    <div id="result"></div>

    <script type="module">
import { applyAppShell } from '../js/ui/appShell.js'
applyAppShell()

        import {
            saveMockTest
        }

        from '../js/database/mockTests.js'

        import {
            calculateAccuracy
        }

        from '../js/utils/analytics.js'

        const form =
        document.getElementById(
            'mockForm'
        )

        form.addEventListener(
            'submit',

            async event => {

                event.preventDefault()

                const mockName =
                document
                .getElementById(
                    'mockName'
                ).value

                const mockType =
                document
                .getElementById(
                    'mockType'
                ).value

                const score =
                Number(
                    document
                    .getElementById(
                        'score'
                    ).value
                )

                const total =
                Number(
                    document
                    .getElementById(
                        'total'
                    ).value
                )

                const accuracy =
                calculateAccuracy(
                    score,
                    total
                )

                await saveMockTest({

                    user_name:
                    'demo-user',

                    mock_name:
                    mockName,

                    subject:
                    mockType,

                    score,

                    total
                })

                document
                .getElementById(
                    'result'
                )

                .innerHTML = `

                    <div class="presence-card">

                        Accuracy:
                        ${accuracy}%

                    </div>
                `
            }
        )

    </script>

</body>

</html>
