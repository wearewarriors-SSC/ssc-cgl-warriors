<!DOCTYPE html>
<html>
<head>
<title>Study Rooms</title>
<link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<h1>Live Study Rooms</h1>

<input
id="roomName"
placeholder="Room Name"
>

<button id="joinBtn">
Join Room
</button>

<div id="rooms"></div>

<script type="module">
import { applyAppShell } from '../js/ui/appShell.js'
applyAppShell()
import '../js/auth/guard.js'

import {
requireAuth
}
from '../js/auth/session.js'

import {
joinStudyRoom,
getStudyRooms
}
from '../js/database/rooms.js'

import {
supabase
}
from '../js/config/supabase.js'

const user =
await requireAuth()

async function loadRooms() {

const rooms =
await getStudyRooms()

const container =
document.getElementById(
'rooms'
)

container.innerHTML = ''

rooms.forEach(room => {

const card =
document.createElement('div')

card.className =
'presence-card'

card.innerHTML = `

🏠 ${room.room_name}

<br><br>

${room.user_email}

`

container.appendChild(card)

})
}

document
.getElementById(
'joinBtn'
)

.addEventListener(

'click',

async () => {

await joinStudyRoom({

room_name:
document
.getElementById(
'roomName'
).value,

user_email:
user.email

})

loadRooms()

}
)

await loadRooms()

supabase

.channel(
'rooms-live'
)

.on(

'postgres_changes',

{

event: '*',

schema: 'public',

table:
'study_rooms_live'
},

() => {

loadRooms()

}
)

.subscribe()

</script>

</body>
</html>
