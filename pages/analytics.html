<!DOCTYPE html>

<html>

<head>

    <title>
        Analytics Dashboard
    </title>

    <link
        rel="stylesheet"
        href="../css/dashboard.css"
    >

</head>

<body>

    <h1>
        Performance Analytics
    </h1>

    <div id="summary"></div>

    <div id="insights"></div>

    <canvas
        id="performanceChart"
        width="400"
        height="200"
    ></canvas>

    <canvas
        id="radarChart"
        width="400"
        height="200"
    ></canvas>

    <script type="module">
import { showToast } from '../js/ui/toast.js'
import { applyAppShell } from '../js/ui/appShell.js'
applyAppShell()
import '../js/auth/guard.js'

        import {
            getStudyStats
        }

        from '../js/utils/stats.js'

        import {
            generateInsight
        }

        from '../js/utils/aiInsights.js'

        import {
            buildPerformanceChart
        }

        from '../js/charts/performanceChart.js'

        import {
            buildRadarChart
        }

        from '../js/charts/radarChart.js'

        import {
            calculateReadiness
        }

        from '../js/utils/readiness.js'

        import {
            calculateConsistency
        }

        from '../js/utils/consistency.js'

        import {
            calculateMomentum
        }

        from '../js/utils/momentum.js'

        const stats =
        getStudyStats()

        const readiness =
        calculateReadiness(
            78,
            24,
            12
        )

        const consistency =
        calculateConsistency(
            20,
            30
        )

        const momentum =
        calculateMomentum(
            12,
            6,
            14
        )

        document
        .getElementById(
            'summary'
        )

        .innerHTML = `

            <div class="presence-card">

                <h3>
                    Study Summary
                </h3>

                Sessions:
                ${stats.totalSessions}

                <br><br>

                Minutes:
                ${stats.totalMinutes}

                <br><br>

                Readiness:
                ${readiness}

                <br><br>

                Consistency:
                ${consistency}%

                <br><br>

                Momentum:
                ${momentum}

            </div>
        `

        document
        .getElementById(
            'insights'
        )

        .innerHTML = `

            <div class="presence-card">

                <h3>
                    AI Insight
                </h3>

                ${generateInsight(stats)}

            </div>
        `

        buildPerformanceChart(

            document.getElementById(
                'performanceChart'
            ),

            [
                'Mon',
                'Tue',
                'Wed',
                'Thu',
                'Fri',
                'Sat',
                'Sun'
            ],

            [
                52,
                60,
                68,
                74,
                81,
                85,
                90
            ]
        )

        buildRadarChart(

            document.getElementById(
                'radarChart'
            ),

            [
                82,
                75,
                78,
                69
            ]
        )

    </script>

</body>

</html>
