<!DOCTYPE html>

<html>

<head>

    <title>
        Achievements
    </title>

    <link
        rel="stylesheet"
        href="../css/dashboard.css"
    >

</head>

<body>

    <h1>
        Achievement Badges
    </h1>

    <button id="unlockBtn">
        Unlock First Badge
    </button>

    <div id="badges"></div>

    <script type="module">
import { showToast } from '../js/ui/toast.js'
import { applyAppShell } from '../js/ui/appShell.js'
applyAppShell()
import '../js/auth/guard.js'

        import {
            requireAuth
        }

        from '../js/auth/session.js'

        import {
            unlockAchievement,
            getAchievements
        }

        from '../js/database/achievements.js'

        const user =
        await requireAuth()

        async function loadBadges() {

            const badges =
            await getAchievements(
                user.email
            )

            const container =
            document.getElementById(
                'badges'
            )

            container.innerHTML = ''

            badges.forEach(badge => {

                const card =
                document.createElement(
                    'div'
                )

                card.className =
                'presence-card'

                card.innerHTML = `

                    🏆

                    <br><br>

                    ${badge.badge}
                `

                container.appendChild(
                    card
                )
            })
        }

        document
        .getElementById(
            'unlockBtn'
        )

        .addEventListener(

            'click',

            async () => {

                await unlockAchievement({

                    user_email:
                    user.email,

                    badge:
                    'First Study Session'
                })

                loadBadges()
            }
        )

        loadBadges()

    </script>

</body>

</html>
