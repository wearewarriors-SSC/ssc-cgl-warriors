<!DOCTYPE html>
<html>
<head>
<title>Study Timer</title>
<link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<h1>Pomodoro Timer</h1>

<div class="presence-card">

<h2 id="timer">
25:00
</h2>

<button id="startBtn">
Start
</button>

<button id="resetBtn">
Reset
</button>

</div>

<script>

let total =
25 * 60

let interval

const timer =
document.getElementById(
'timer'
)

function render() {

const mins =
String(
Math.floor(total/60)
).padStart(2,'0')

const secs =
String(
total%60
).padStart(2,'0')

timer.innerText =
`${mins}:${secs}`
}

document
.getElementById(
'startBtn'
)

.addEventListener(

'click',

() => {

clearInterval(interval)

interval =
setInterval(() => {

if(total <= 0){

clearInterval(interval)

alert(
'Session Complete!'
)

return
}

total--

render()

},1000)

}
)

document
.getElementById(
'resetBtn'
)

.addEventListener(

'click',

() => {

total =
25 * 60

render()

}
)

render()

</script>

</body>
</html>
