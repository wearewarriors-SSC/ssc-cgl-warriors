<!DOCTYPE html>
<html>
<head>
<title>Weekly Goals</title>
<link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<h1>Weekly Goals</h1>

<input
id="goalInput"
placeholder="Enter weekly goal"
>

<button id="addBtn">
Add Goal
</button>

<div id="goals"></div>

<script type="module">
import '../js/auth/guard.js'

import {
requireAuth
}
from '../js/auth/session.js'

import {
supabase
}
from '../js/config/supabase.js'

const user =
await requireAuth()

async function loadGoals() {

const {
data
} = await supabase

.from('weekly_goals')

.select('*')

.eq(
'user_email',
user.email
)

const container =
document.getElementById(
'goals'
)

container.innerHTML = ''

data.forEach(goal => {

const card =
document.createElement('div')

card.className =
'presence-card'

card.innerHTML = `

🎯 ${goal.goal}

`

container.appendChild(card)

})
}

document
.getElementById(
'addBtn'
)

.addEventListener(

'click',

async () => {

await supabase

.from('weekly_goals')

.insert([{

user_email:
user.email,

goal:
document
.getElementById(
'goalInput'
).value

}])

document
.getElementById(
'goalInput'
).value = ''

loadGoals()

}
)

loadGoals()

</script>

</body>
</html>
