<!DOCTYPE html>
<html>
<head>
<title>Session History</title>
<link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<h1>Study Session History</h1>

<div id="history"></div>

<script type="module">
import { applyAppShell } from '../js/ui/appShell.js'
applyAppShell()
import '../js/auth/guard.js'

import {
requireAuth
}
from '../js/auth/session.js'

import {
getSessions
}
from '../js/database/sessions.js'

const user =
await requireAuth()

const sessions =
await getSessions(
user.id
)

const container =
document.getElementById(
'history'
)

sessions.forEach(session => {

const card =
document.createElement('div')

card.className =
'presence-card'

card.innerHTML = `

📚 Study Session

<br><br>

Minutes:
${session.duration}

<br><br>

${session.created_at}

`

container.appendChild(card)

})

</script>

</body>
</html>
