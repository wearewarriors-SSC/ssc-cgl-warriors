<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        SSC CGL Warriors Arena
    </title>

    <link
        rel="icon"
        href="./assets/favicon.ico"
    >

    <link
        rel="stylesheet"
        href="./css/globals.css"
    >

     <link
    rel="manifest"
    href="./manifest.json"
    >

</head>

<body>

    <div id="app">

        <h1>
            SSC CGL Warriors Arena
        </h1>

        <p id="welcomeText">
            Initializing...
        </p>

        <div class="timer-card">

            <select id="subjectSelect">

                <option value="Mathematics">
                    Mathematics
                </option>

                <option value="Reasoning">
                    Reasoning
                </option>

                <option value="English">
                    English
                </option>

                <option value="General Awareness">
                    General Awareness
                </option>

            </select>

            <h2 id="timerDisplay">
                25:00
            </h2>

            <div class="buttons">

                <button id="startBtn">
                    Start
                </button>

                <button id="stopBtn">
                    Stop
                </button>

            </div>

        </div>

        <div class="presence-wrapper">

            <h2>
                Live Battleground
            </h2>

            <div
                id="presenceContainer"
            ></div>

        </div>

    </div>

    <script
        type="module"
        src="./js/app.js"
    ></script>

     <script>

if (
    'serviceWorker'
    in navigator
) {

    navigator.serviceWorker
        .register(
            './service-worker.js'
        )
}

</script>


</body>

</html>
